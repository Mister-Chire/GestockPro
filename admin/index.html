<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/gestockpro-favicon.png">
<title>Superadmin - GestockPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  [data-theme="dark"] {
    --bg: #0f0f0f; --surface: #191919; --surface2: #222222;
    --border: #2e2e2e; --border2: #3a3a3a; --text: #f0ede8;
    --muted: #888; --faint: #555; --accent: #e8b84b; --accent2: #d4a03a;
    --green: #4caf82; --green-bg: #0e2b1e; --red: #e05c5c; --red-bg: #2b0e0e;
    --shadow: rgba(0,0,0,0.4);
  }
  [data-theme="light"] {
    --bg: #f5f3ef; --surface: #ffffff; --surface2: #f0ede8;
    --border: #e0ddd8; --border2: #ccc9c3; --text: #1a1a1a;
    --muted: #777; --faint: #aaa; --accent: #c49a28; --accent2: #b38820;
    --green: #2e8a5c; --green-bg: #e6f4ed; --red: #c0392b; --red-bg: #fdecea;
    --shadow: rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; }

  /* LOGIN */
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 40px var(--shadow); }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .login-logo span { color: var(--red); font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 400; margin-left: 8px; vertical-align: middle; background: var(--red-bg); padding: 2px 8px; border-radius: 4px; }
  .login-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 10px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--accent); }
  .login-err { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; display: none; }
  .login-err.show { display: block; }
  .btn-login { width: 100%; background: var(--accent); color: #0f0f0f; border: none; border-radius: 8px; padding: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-login:hover { background: var(--accent2); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  /* APP */
  #appScreen { display: none; }
  header { border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; gap: 20px; height: 56px; background: var(--bg); }
  .logo { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--accent); }
  .logo span { color: var(--red); font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 400; margin-left: 8px; background: var(--red-bg); padding: 2px 8px; border-radius: 4px; }
  .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-primary { background: var(--accent); color: #0f0f0f; border: none; padding: 8px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  main { padding: 28px; max-width: 1000px; }
  h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  /* EMPRESAS TABLE */
  .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 32px; }
  .table-head { display: grid; grid-template-columns: 1fr 180px 120px 100px 80px; padding: 10px 16px; background: var(--surface2); border-bottom: 2px solid var(--border2); font-size: 11px; font-weight: 500; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; }
  .table-row { display: grid; grid-template-columns: 1fr 180px 120px 100px 80px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; transition: background 0.1s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface2); }
  .empresa-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .empresa-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--faint); margin-top: 2px; }
  .badge-count { display: inline-block; background: var(--surface2); border: 1px solid var(--border2); padding: 2px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .btn-sm { padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-right: 4px; }
  .btn-sm:hover { color: var(--text); border-color: var(--muted); }
  .btn-sm.danger:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 500px; overflow: hidden; }
  .modal-hdr { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-hdr h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px 22px; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* USERS LIST */
  .users-list { margin-top: 16px; }
  .user-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .user-row:last-child { border-bottom: none; }
  .user-email { flex: 1; font-size: 13px; }
  .user-rol { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }

  .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 8px; }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 999; animation: toastIn 0.2s ease; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal { animation: slideUp 0.2s ease; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px">
      <img src="/gestockpro-fondo-oscuro.png" alt="GestockPro" style="height:40px;width:auto;object-fit:contain;" id="loginLogo">
      <span style="font-size:11px;color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;width:fit-content">SUPERADMIN</span>
    </div>
    <div class="login-subtitle">Acceso restringido — solo administradores</div>
    <div class="login-err" id="loginErr">Email o contraseña incorrectos</div>
    <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="admin@email.com"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="btn-login" id="btnLogin" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="logo" style="display:flex;align-items:center;gap:10px">
      <img id="logoImg" src="/gestockpro-fondo-oscuro.png" alt="GestockPro" style="height:32px;width:auto;object-fit:contain;">
      <span style="font-size:10px;color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace">SUPERADMIN</span>
    </div>
    <div class="hdr-right">
      <span id="adminEmail" style="font-size:12px;color:var(--muted)"></span>
      <button id="btnTema" onclick="toggleTema()" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">🌙</button>
      <button class="btn-primary" onclick="abrirModalEmpresa()">+ Nueva empresa</button>
      <button class="btn-ghost" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <main>
    <h2>Empresas registradas</h2>
    <div class="table-wrap">
      <div class="table-head">
        <span>Empresa</span>
        <span>Creada</span>
        <span>Usuarios</span>
        <span>Pedidos</span>
        <span>Acciones</span>
      </div>
      <div id="empresasList"><div class="empty">Cargando...</div></div>
    </div>
  </main>
</div>

<!-- CONFIRM ELIMINAR -->
<div class="overlay" id="confirmEliminar">
  <div class="modal" style="max-width:380px;text-align:center;padding:32px 24px">
    <div style="font-size:32px;margin-bottom:12px">🗑</div>
    <h3 style="font-family:'Syne',sans-serif;font-size:16px;margin-bottom:8px">Eliminar empresa</h3>
    <p id="confirmEliminarMsg" style="color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.5"></p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn-ghost" onclick="cerrarModal('confirmEliminar')">Cancelar</button>
      <button class="btn-primary" style="background:var(--red);color:#fff" onclick="ejecutarEliminarEmpresa()">Eliminar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVA EMPRESA -->
<div class="overlay" id="modalEmpresa" onclick="cerrarSiOverlay(event,'modalEmpresa')">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalEmpresaTitle">Nueva empresa</h3>
      <button class="modal-close" onclick="cerrarModal('modalEmpresa')">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nombre del taller</label><input type="text" id="eNombre" placeholder="Ej: Taller García"></div>
      <div class="field"><label>URL del logo (opcional)</label><input type="text" id="eLogo" placeholder="https://..."></div>

      <div class="section-title" style="margin-top:16px">Módulos activos</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding:12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border2)">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;text-transform:none;letter-spacing:0">
          <input type="checkbox" id="modItv" checked style="accent-color:var(--accent)"> 🏭 ITV
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;text-transform:none;letter-spacing:0">
          <input type="checkbox" id="modAgenda" checked style="accent-color:var(--accent)"> 📅 Agenda
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;text-transform:none;letter-spacing:0">
          <input type="checkbox" id="modCaja" style="accent-color:var(--accent)"> 💰 Caja
        </label>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:4px;padding:12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border2)">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">
          <input type="checkbox" id="eEsPrueba" onchange="togglePrueba(this.checked)" style="width:16px;height:16px;accent-color:var(--accent)">
          Empresa en período de prueba
        </label>
        <div id="fechaExpWrap" style="display:none;flex:1">
          <input type="date" id="eFechaExp" style="background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;width:100%">
        </div>
      </div>

      <div class="section-title">Usuarios asignados</div>
      <div id="usuariosEmpresa" class="users-list"></div>

      <div class="section-title" style="margin-top:20px">Crear usuario</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <input type="email" id="nuevoUserEmail" placeholder="email@taller.com" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none">
        <input type="password" id="nuevoUserPass" placeholder="Contraseña" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none">
      </div>
      <button class="btn-primary" onclick="crearYAsignarUsuario()" style="margin-top:8px;width:100%">+ Crear usuario y asignar</button>
      <div id="userSearchMsg" style="font-size:12px;color:var(--muted);margin-top:6px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="cerrarModal('modalEmpresa')">Cancelar</button>
      <button class="btn-primary" id="btnGuardarEmpresa" onclick="guardarEmpresa()">Guardar empresa</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ludlgcdqorkguaershes.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ulnaac-sM7thLuFFmxv8HA_P-WkA7_t';
let authToken = null;
let empresas = [];
let editandoEmpresaId = null;
let usuariosEditando = [];

const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  ...opts,
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
    ...(opts.headers || {})
  }
});

const apiAuth = (path, opts = {}) => fetch(`${SUPABASE_URL}/auth/v1/${path}`, {
  ...opts,
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${authToken}`,
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  }
});

// ===== TEMA =====
function initTema() {
  const saved = localStorage.getItem('admin_tema') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('btnTema');
  if (btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
  actualizarLogo(saved);
  const loginLogo = document.getElementById('loginLogo');
  if (loginLogo) {
    loginLogo.src = saved === 'dark'
      ? '/gestockpro-fondo-oscuro.png'
      : '/gestockpro-fondo-claro.png';
  }
}
function toggleTema() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('btnTema').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('admin_tema', next);
  actualizarLogo(next);
}

function actualizarLogo(tema) {
  const logo = document.getElementById('logoImg');
  if (logo) {
    logo.src = tema === 'dark'
      ? '/gestockpro-fondo-oscuro.png'
      : '/gestockpro-fondo-claro.png';
  }
}

// ===== AUTH =====
async function login() {
  const email = document.getElementById('lEmail').value.trim();
  const pass = document.getElementById('lPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok || !data.access_token) throw new Error();
    authToken = data.access_token;

    // Verify user is superadmin
    const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/superadmins?user_id=eq.${data.user.id}&select=user_id`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${authToken}`
      }
    });
    const checkData = await checkRes.json();
    if (!checkData.length) {
      authToken = null;
      err.textContent = 'No tienes permisos de administrador.';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Entrar';
      return;
    }

    document.getElementById('adminEmail').textContent = email;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    cargarEmpresas();
  } catch {
    err.classList.add('show');
  } finally { btn.disabled = false; btn.textContent = 'Entrar'; }
}

function cerrarSesion() {
  authToken = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lPass').value = '';
}

document.getElementById('lPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
initTema();

// ===== EMPRESAS =====
async function cargarEmpresas() {
  try {
    // Get all empresas (need service role or bypass RLS for admin)
    const res = await api('empresas?select=id,nombre,logo_url,created_at,es_prueba,fecha_expiracion,modulos&order=created_at.asc');
    if (!res.ok) throw new Error();
    empresas = await res.json();

    // Get user counts per empresa
    const resU = await api('usuarios_empresas?select=empresa_id');
    const resP = await api('pedidos?select=empresa_id');
    const usuarios = resU.ok ? await resU.json() : [];
    const pedidos = resP.ok ? await resP.json() : [];

    const countU = {};
    const countP = {};
    usuarios.forEach(u => countU[u.empresa_id] = (countU[u.empresa_id] || 0) + 1);
    pedidos.forEach(p => countP[p.empresa_id] = (countP[p.empresa_id] || 0) + 1);

    const container = document.getElementById('empresasList');
    if (!empresas.length) {
      container.innerHTML = '<div class="empty">No hay empresas registradas aún</div>';
      return;
    }
    container.innerHTML = empresas.map(e => `
      <div class="table-row">
        <div>
          <div class="empresa-name" style="display:flex;align-items:center;gap:8px">
            ${e.nombre}
            ${e.es_prueba ? `<span style="font-size:10px;background:var(--yellow-bg);color:var(--yellow);padding:1px 7px;border-radius:10px;font-family:'DM Mono',monospace">${e.fecha_expiracion ? (new Date(e.fecha_expiracion) < new Date() ? '❌ Expirada' : '⏳ Prueba hasta ' + new Date(e.fecha_expiracion).toLocaleDateString('es-ES')) : '⏳ Prueba'}</span>` : ''}
          </div>
          <div class="empresa-id">${e.id}</div>
          <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">
            ${(e.modulos?.itv !== false) ? '<span style="font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--muted)">🏭 ITV</span>' : ''}
            ${(e.modulos?.agenda !== false) ? '<span style="font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--muted)">📅 Agenda</span>' : ''}
            ${(e.modulos?.caja) ? '<span style="font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--muted)">💰 Caja</span>' : ''}
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted)">${new Date(e.created_at).toLocaleDateString('es-ES')}</div>
        <div><span class="badge-count">${countU[e.id] || 0} usuarios</span></div>
        <div><span class="badge-count">${countP[e.id] || 0} pedidos</span></div>
        <div>
          <button class="btn-sm" onclick="abrirModalEditar('${e.id}')">✏ Editar</button>
          <button class="btn-sm danger" onclick="confirmarEliminarEmpresa('${e.id}','${e.nombre}')">✕ Eliminar</button>
        </div>
      </div>`).join('');
  } catch(err) {
    console.error(err);
    document.getElementById('empresasList').innerHTML = '<div class="empty">Error cargando empresas</div>';
  }
}

// ===== MODAL EMPRESA =====
function abrirModalEmpresa() {
  editandoEmpresaId = null;
  usuariosEditando = [];
  document.getElementById('modalEmpresaTitle').textContent = 'Nueva empresa';
  document.getElementById('eNombre').value = '';
  document.getElementById('eLogo').value = '';
  document.getElementById('modItv').checked = true;
  document.getElementById('modAgenda').checked = true;
  document.getElementById('modCaja').checked = false;
  document.getElementById('eEsPrueba').checked = false;
  document.getElementById('eFechaExp').value = '';
  document.getElementById('fechaExpWrap').style.display = 'none';
  document.getElementById('nuevoUserEmail').value = '';
  document.getElementById('userSearchMsg').textContent = '';
  renderUsuariosModal();
  document.getElementById('modalEmpresa').classList.add('active');
}

async function abrirModalEditar(eid) {
  const e = empresas.find(x => x.id === eid);
  if (!e) return;
  editandoEmpresaId = eid;
  document.getElementById('modalEmpresaTitle').textContent = 'Editar — ' + e.nombre;
  document.getElementById('eNombre').value = e.nombre || '';
  document.getElementById('eLogo').value = e.logo_url || '';
  const mods = e.modulos || { itv: true, agenda: true, caja: false };
  document.getElementById('modItv').checked = mods.itv !== false;
  document.getElementById('modAgenda').checked = mods.agenda !== false;
  document.getElementById('modCaja').checked = mods.caja === true;
  document.getElementById('eEsPrueba').checked = e.es_prueba || false;
  if (e.es_prueba && e.fecha_expiracion) {
    document.getElementById('eFechaExp').value = e.fecha_expiracion.slice(0, 10);
    document.getElementById('fechaExpWrap').style.display = 'block';
  } else {
    document.getElementById('eFechaExp').value = '';
    document.getElementById('fechaExpWrap').style.display = 'none';
  }
  document.getElementById('nuevoUserEmail').value = '';
  document.getElementById('userSearchMsg').textContent = '';

  // Load users for this empresa
  try {
    const res = await api(`usuarios_empresas?empresa_id=eq.${eid}&select=user_id,rol`);
    const ues = res.ok ? await res.json() : [];
    // Get user emails
    usuariosEditando = [];
    for (const ue of ues) {
      const r = await apiAuth(`admin/users/${ue.user_id}`);
      if (r.ok) {
        const u = await r.json();
        usuariosEditando.push({ user_id: ue.user_id, email: u.email, rol: ue.rol });
      }
    }
  } catch { usuariosEditando = []; }

  renderUsuariosModal();
  document.getElementById('modalEmpresa').classList.add('active');
}

function togglePrueba(checked) {
  document.getElementById('fechaExpWrap').style.display = checked ? 'block' : 'none';
  if (checked && !document.getElementById('eFechaExp').value) {
    // Set default to 1 month from today
    const d = new Date();
    d.setMonth(d.getMonth() + 1);
    document.getElementById('eFechaExp').value = d.toISOString().slice(0, 10);
  }
}

function renderUsuariosModal() {
  const container = document.getElementById('usuariosEmpresa');
  if (!usuariosEditando.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--faint);padding:8px 0">Sin usuarios asignados</div>';
    return;
  }
  container.innerHTML = usuariosEditando.map((u, i) => `
    <div class="user-row">
      <span class="user-email">${u.email}</span>
      <span class="user-rol">${u.rol}</span>
      <button class="btn-sm danger" onclick="quitarUsuario(${i})">✕</button>
    </div>`).join('');
}

function quitarUsuario(idx) {
  usuariosEditando.splice(idx, 1);
  renderUsuariosModal();
}

async function buscarYAsignarExistente() {
  const email = document.getElementById('nuevoUserEmail').value.trim();
  const msg = document.getElementById('userSearchMsg');
  if (!email) { msg.textContent = 'Introduce el email del usuario.'; msg.style.color = 'var(--red)'; return; }
  if (usuariosEditando.find(u => u.email === email)) { msg.textContent = 'Este usuario ya está en la lista.'; msg.style.color = 'var(--yellow)'; return; }
  msg.textContent = 'Buscando...'; msg.style.color = 'var(--muted)';
  try {
    const res = await apiAuth('admin/users?email=' + encodeURIComponent(email));
    if (!res.ok) throw new Error('Error al buscar');
    const data = await res.json();
    const user = (data.users || []).find(u => u.email === email);
    if (!user) { msg.textContent = 'Usuario no encontrado. Usa "Crear nuevo" si no existe.'; msg.style.color = 'var(--red)'; return; }
    usuariosEditando.push({ user_id: user.id, email: user.email, rol: 'operario' });
    renderUsuariosModal();
    document.getElementById('nuevoUserEmail').value = '';
    msg.textContent = '✓ Usuario existente asignado';
    msg.style.color = 'var(--green)';
    setTimeout(() => msg.textContent = '', 2500);
  } catch(e) {
    msg.textContent = 'Error: ' + e.message; msg.style.color = 'var(--red)';
  }
}

async function crearYAsignarUsuario() {
  const email = document.getElementById('nuevoUserEmail').value.trim();
  const pass = document.getElementById('nuevoUserPass').value;
  const msg = document.getElementById('userSearchMsg');

  if (!email) { msg.textContent = 'Introduce un email.'; msg.style.color = 'var(--red)'; return; }
  if (!pass || pass.length < 6) { msg.textContent = 'La contraseña debe tener al menos 6 caracteres.'; msg.style.color = 'var(--red)'; return; }
  if (usuariosEditando.find(u => u.email === email)) { msg.textContent = 'Este usuario ya está en la lista.'; msg.style.color = 'var(--yellow)'; return; }

  msg.textContent = 'Creando usuario...'; msg.style.color = 'var(--muted)';

  try {
    const res = await fetch('https://ludlgcdqorkguaershes.supabase.co/functions/v1/crear-usuario', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify({ email, password: pass })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Error al crear usuario');

    usuariosEditando.push({ user_id: data.id, email: data.email, rol: 'operario' });
    renderUsuariosModal();
    document.getElementById('nuevoUserEmail').value = '';
    document.getElementById('nuevoUserPass').value = '';
    msg.textContent = '✓ Usuario creado y asignado';
    msg.style.color = 'var(--green)';
    setTimeout(() => msg.textContent = '', 2500);
  } catch(e) {
    msg.textContent = 'Error: ' + e.message;
    msg.style.color = 'var(--red)';
  }
}

async function guardarEmpresa() {
  const nombre = document.getElementById('eNombre').value.trim();
  const logo = document.getElementById('eLogo').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  const btn = document.getElementById('btnGuardarEmpresa');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    let eid = editandoEmpresaId;
    const esPrueba = document.getElementById('eEsPrueba').checked;
    const fechaExp = document.getElementById('eFechaExp').value;
    const empresaData = {
      nombre,
      logo_url: logo || null,
      es_prueba: esPrueba,
      fecha_expiracion: esPrueba && fechaExp ? new Date(fechaExp + 'T23:59:59').toISOString() : null,
      modulos: {
        itv: document.getElementById('modItv').checked,
        agenda: document.getElementById('modAgenda').checked,
        caja: document.getElementById('modCaja').checked
      }
    };
    if (eid) {
      await api(`empresas?id=eq.${eid}`, { method: 'PATCH', body: JSON.stringify(empresaData) });
    } else {
      const res = await api('empresas', { method: 'POST', body: JSON.stringify(empresaData) });
      const data = await res.json();
      eid = data[0].id;
    }

    // Sync usuarios_empresas
    if (eid) {
      // Remove all existing and re-add
      await api(`usuarios_empresas?empresa_id=eq.${eid}`, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      for (const u of usuariosEditando) {
        await api('usuarios_empresas', {
          method: 'POST',
          headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify({ user_id: u.user_id, empresa_id: eid, rol: u.rol })
        });
      }
    }

    cerrarModal('modalEmpresa');
    await cargarEmpresas();
    showToast('✓ Empresa guardada correctamente', 'success');
  } catch(e) {
    console.error(e);
    showToast('Error al guardar', 'error');
  } finally { btn.disabled = false; btn.textContent = 'Guardar empresa'; }
}

function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }
function cerrarSiOverlay(e, id) { if (e.target === document.getElementById(id)) cerrarModal(id); }

let eliminandoEmpresaId = null;

function confirmarEliminarEmpresa(id, nombre) {
  eliminandoEmpresaId = id;
  document.getElementById('confirmEliminarMsg').textContent =
    '¿Seguro que quieres eliminar "' + nombre + '"? Se eliminarán también todos sus pedidos y clientes. Esta acción no se puede deshacer.';
  document.getElementById('confirmEliminar').classList.add('active');
}

async function ejecutarEliminarEmpresa() {
  if (!eliminandoEmpresaId) return;
  try {
    const res = await fetch('https://ludlgcdqorkguaershes.supabase.co/functions/v1/eliminar-empresa', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify({ empresa_id: eliminandoEmpresaId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al eliminar');
    cerrarModal('confirmEliminar');
    await cargarEmpresas();
    showToast('Empresa eliminada correctamente', 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
  eliminandoEmpresaId = null;
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
